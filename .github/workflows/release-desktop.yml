name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.3.18)"
        required: true
      force:
        description: "Delete existing assets before uploading (overwrite)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: release-desktop
  cancel-in-progress: false

env:
  PG_RELEASE_TAG: pg-binaries

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"
            echo "tag=v${V}" >> "$GITHUB_OUTPUT"
            echo "version=${V}" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ github.ref_name }}"
            echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or find release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if [ -n "${{ github.event.inputs.version }}" ]; then
            git tag "$TAG" || true
            git push origin "$TAG" || true
          fi
          gh release view "$TAG" --repo ${{ github.repository }} 2>/dev/null || \
            gh release create "$TAG" --repo ${{ github.repository }} --title "RimeDeck $TAG" --generate-notes

      - name: Delete existing assets (force overwrite)
        if: ${{ github.event.inputs.force == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          echo "Force mode: deleting existing assets from release $TAG"
          gh release view "$TAG" --repo ${{ github.repository }} --json assets -q '.assets[].name' | while read -r name; do
            if [ -n "$name" ]; then
              echo "  deleting $name"
              gh release delete-asset "$TAG" "$name" --repo ${{ github.repository }} --yes
            fi
          done
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}

  build-macos:
    needs: create-release
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle PostgreSQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download $PG_RELEASE_TAG --pattern "pg-17-darwin-arm64.tar.gz" --repo ${{ github.repository }}
          tar xzf pg-17-darwin-arm64.tar.gz
          mkdir -p apps/desktop/resources/pgsql
          cp -R pgsql/* apps/desktop/resources/pgsql/
          rm -rf pgsql pg-17-darwin-arm64.tar.gz

      - name: Package Desktop (macOS arm64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: node scripts/package.mjs --mac --arm64 --publish always

  build-windows:
    needs: create-release
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle PostgreSQL
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download $PG_RELEASE_TAG --pattern "pg-17-windows-x64.zip" --repo ${{ github.repository }}
          unzip -qo pg-17-windows-x64.zip
          mkdir -p apps/desktop/resources/pgsql
          cp -R pgsql/* apps/desktop/resources/pgsql/
          rm -rf pgsql pg-17-windows-x64.zip

      - name: Package Desktop (Windows x64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: node scripts/package.mjs --win --x64 --publish always

  build-linux:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install rpmbuild
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Bundle PostgreSQL
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download $PG_RELEASE_TAG --pattern "pg-17-linux-x64.tar.gz" --repo ${{ github.repository }}
          tar xzf pg-17-linux-x64.tar.gz
          mkdir -p apps/desktop/resources/pgsql
          cp -R pgsql/* apps/desktop/resources/pgsql/
          rm -rf pgsql pg-17-linux-x64.tar.gz

      - name: Package Desktop (Linux x64)
        working-directory: apps/desktop
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          RELEASE_VERSION: ${{ needs.create-release.outputs.version }}
        run: node scripts/package.mjs --linux --x64 --publish always
